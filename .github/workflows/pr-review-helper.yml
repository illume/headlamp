name: PR Review Helper

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review]
  pull_request_review:
    types: [submitted, edited, dismissed]
  pull_request_review_comment:
    types: [created]
  issue_comment:
    types: [created]
  workflow_run:
    workflows: ["Build Frontend"]
    types: [completed]

permissions:
  actions: read
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: pr-review-helper-${{ github.event.pull_request.number || github.event.issue.number || github.event.workflow_run.id }}
  cancel-in-progress: false

jobs:
  pr-review-helper:
    if: >-
      github.actor != 'github-actions[bot]' &&
      (github.event_name != 'workflow_run' ||
      (github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'failure'))
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7
        with:
          persist-credentials: false
          fetch-depth: 1

      - uses: actions/setup-node@60edb5dd545a775178f52524783378180af0d1f8 # v4.0.2
        with:
          node-version: 24.x

      - name: Install PR review helper dependencies
        run: npm ci --ignore-scripts

      - name: Format check PR review helper
        run: npm run pr-review-helper:format-check

      - name: Lint PR review helper
        run: npm run pr-review-helper:lint

      - name: Type check PR review helper
        run: npx tsc --project .github/scripts/pr-review-helper/tsconfig.json

      - name: Test PR review helper
        run: node --test .github/scripts/pr-review-helper/pr-review-helper.test.ts

      - name: Run PR review helper
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node --experimental-strip-types .github/scripts/pr-review-helper/pr-review-helper.ts
