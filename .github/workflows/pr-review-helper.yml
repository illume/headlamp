name: PR Review Helper

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review]
  pull_request_review:
    types: [submitted, edited, dismissed]
  pull_request_review_comment:
    types: [created]
  issue_comment:
    types: [created]
  workflow_run:
    workflows: ["Build Frontend"]
    types: [completed]

permissions:
  actions: read
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: pr-review-helper-${{ github.event.pull_request.number || github.event.issue.number || github.event.workflow_run.id }}
  cancel-in-progress: false

jobs:
  pr-review-helper:
    if: >-
      github.event_name != 'workflow_run' ||
      (github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'failure')
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7

      - uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            const helper = require('./.github/scripts/pr-review-helper.js');
            await helper.run({ github, context, core });
